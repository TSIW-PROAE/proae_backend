steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--pull'
      - '-t'
      - 'gcr.io/$PROJECT_ID/proae-backend:$BUILD_ID'
      - '-t'
      - 'gcr.io/$PROJECT_ID/proae-backend:latest'
      - '.'
    id: 'build-image'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/proae-backend:$BUILD_ID'
    id: 'push-image-sha'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/proae-backend:latest'
    id: 'push-image-latest'


  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'proae-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/proae-backend:$BUILD_ID'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      # Use $PROJECT_ID nos args do passo (expandido pelo Cloud Build). Em `substitutions:`,
      # aninhar ${PROJECT_ID} em variáveis customizadas pode NÃO expandir e quebrar o deploy (actAs).
      - '--service-account'
      - 'proae-backend@$PROJECT_ID.iam.gserviceaccount.com'
      # Postgres fora do GCP: sem Cloud SQL.
      # ADMINS_EMAILS: crie o secret `admins-emails` no Secret Manager e acrescente abaixo:
      #   ADMINS_EMAILS=admins-emails:latest
      # (sem o secret o deploy falha — por isso não está no deploy padrão).
      - '--set-env-vars'
      - 'NODE_ENV=${_NODE_ENV},USE_CLOUD_SQL=false,CORS_ORIGINS=${_CORS_ORIGINS},BUILD_SHA=$BUILD_ID'
      - '--set-secrets'
      - 'DB_URL=db-url:latest,JWT_SECRET=jwt-secret:latest'
    id: 'deploy-cloud-run'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

# $SHORT_SHA só existe em build disparado por trigger (Git). Em `gcloud builds submit` manual fica vazio.
# $BUILD_ID existe em todo build e evita tag inválida tipo proae-backend:
substitutions:
  _REGION: 'us-central1'
  _NODE_ENV: 'production'
  _CORS_ORIGINS: 'https://proae-frontend.vercel.app'

images:
  - 'gcr.io/$PROJECT_ID/proae-backend:$BUILD_ID'
  - 'gcr.io/$PROJECT_ID/proae-backend:latest'

timeout: '1200s'

