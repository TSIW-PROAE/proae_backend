steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--pull'
      - '-t'
      - 'gcr.io/$PROJECT_ID/proae-backend-dev:$BUILD_ID'
      - '-t'
      - 'gcr.io/$PROJECT_ID/proae-backend-dev:latest'
      - '.'
    id: 'build-image'
  
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/proae-backend-dev:$BUILD_ID'
    id: 'push-image-sha'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/proae-backend-dev:latest'
    id: 'push-image-latest'

  # Deploy no Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'proae-backend-dev'
      - '--image'
      - 'gcr.io/$PROJECT_ID/proae-backend-dev:$BUILD_ID'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--service-account'
      - 'proae-backend-dev@$PROJECT_ID.iam.gserviceaccount.com'
      - '--set-env-vars'
      - 'NODE_ENV=${_NODE_ENV},USE_CLOUD_SQL=false,CORS_ORIGINS=${_CORS_ORIGINS},BUILD_SHA=$BUILD_ID'
      - '--set-secrets'
      - 'DB_URL=db-url-dev:latest,JWT_SECRET=jwt-secret-dev:latest'
    id: 'deploy-cloud-run'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

# $BUILD_ID: tag válida também em `gcloud builds submit` manual (SHORT_SHA vem vazio fora de trigger Git).
substitutions:
  _REGION: 'us-central1'
  _NODE_ENV: 'development'
  # Sem vírgula aqui: vírgulas quebram o parser de --set-env-vars. Localhost: use proxy ou outra origem no console.
  _CORS_ORIGINS: 'https://proae-frontend.vercel.app'

images:
  - 'gcr.io/$PROJECT_ID/proae-backend-dev:$BUILD_ID'
  - 'gcr.io/$PROJECT_ID/proae-backend-dev:latest'

timeout: '1200s'

